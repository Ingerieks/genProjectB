version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5193:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=genProjectDb;Username=genProject;Password=G5t!xkXo17yyhV
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: genProjectDb
      POSTGRES_USER: genProject
      POSTGRES_PASSWORD: G5t!xkXo17yyhV
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
